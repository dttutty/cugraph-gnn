[tool.ruff]
line-length = 88
exclude = [
    "__init__.py",
]

[tool.uv.workspace]
members = [
    "python/cugraph-pyg",
    "python/libwholegraph",
    "python/pylibwholegraph",
    "python/wholegraph-torch",
]

[tool.uv.sources]
"cugraph-pyg" = { workspace = true }
libwholegraph = { workspace = true }
pylibwholegraph = { workspace = true }
"wholegraph-torch" = { workspace = true }

[tool.ruff.lint]
ignore = [
    "E203",
]
select = [
    # pycodestyle
    "E4",
    "E7",
    "E9",
    # pyflakes
    "F",
    # flake8-tidy-imports banned-api
    "TID251",
]

[tool.ruff.lint.flake8-tidy-imports.banned-api]
"torch".msg = "Use 'import_optional(\"torch\")' in library code, or the 'torch' pytest fixture in test code (see conftest.py), instead of 'import torch'."

[tool.ruff.lint.per-file-ignores]
"*.ipynb" = [
    "F401",
    "F841",
]
"python/cugraph-pyg/examples/*" = [
    "TID251",
]
