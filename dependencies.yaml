# Dependency list for https://github.com/rapidsai/dependency-file-generator
files:
  all:
    output: [conda]
    matrix:
      cuda: ["12.9", "13.3"]
      arch: [x86_64, aarch64]
    includes:
      - checks
      - common_build
      - cpp_build
      - cuda
      - cuda_version
      - depends_on_cudf
      - depends_on_cuml
      - depends_on_cupy_gnn
      - depends_on_libraft
      - depends_on_librmm
      - depends_on_nccl
      - depends_on_ogb
      - depends_on_pyg
      - depends_on_libwholegraph
      - depends_on_pylibcugraph
      - depends_on_pylibwholegraph
      - depends_on_pytorch
      - depends_on_sentence_transformers
      - depends_on_wholegraph_torch
      - python_build_nanobind
      - python_build_rapids
      - python_build_skbuild
      - python_build_wheel
      - python_run_cugraph_pyg
      - python_run_pylibwholegraph
      - python_run_wholegraph_torch
      - test_python_common
      - test_python_pylibwholegraph
      - test_python_wholegraph_torch
  checks:
    output: none
    includes:
      - checks
      - py_version
  test_cugraph_pyg:
    output: none
    includes:
      - cuda_version
      - depends_on_cudf
      - depends_on_cuml
      - depends_on_ogb
      - depends_on_pytorch
      - depends_on_sentence_transformers
      - py_version
      - test_python_common
      - depends_on_pylibwholegraph
      - depends_on_wholegraph_torch
      - depends_on_cugraph_pyg
  test_wholegraph_cpp:
    output: none
    includes:
      - cuda_version
      - test_cpp
      - depends_on_libwholegraph
      - depends_on_libwholegraph_tests
      - depends_on_nccl
  test_pylibwholegraph:
    output: none
    includes:
      - cuda_version
      - depends_on_cudf
      - py_version
      - test_python_common
      - depends_on_pylibwholegraph
      - test_python_pylibwholegraph
  test_wholegraph_torch:
    output: none
    includes:
      - cuda_version
      - depends_on_cudf
      - depends_on_pytorch
      - py_version
      - test_python_common
      - depends_on_pylibwholegraph
      - depends_on_wholegraph_torch
      - test_python_wholegraph_torch
  py_build_libwholegraph:
    output: pyproject
    pyproject_dir: python/libwholegraph
    extras:
      table: build-system
    includes:
      - python_build_rapids
      - python_build_skbuild
  py_rapids_build_libwholegraph:
    output: pyproject
    pyproject_dir: python/libwholegraph
    extras:
      table: tool.rapids-build-backend
      key: requires
    includes:
      - common_build
      - depends_on_libraft
      - depends_on_librmm
  py_run_libwholegraph:
    output: pyproject
    pyproject_dir: python/libwholegraph
    extras:
      table: project
    includes:
      - depends_on_libraft
      - depends_on_nccl
  py_build_pylibwholegraph:
    output: pyproject
    pyproject_dir: python/pylibwholegraph
    extras:
      table: build-system
    includes:
      - python_build_rapids
      - python_build_skbuild
  py_rapids_build_pylibwholegraph:
    output: pyproject
    pyproject_dir: python/pylibwholegraph
    extras:
      table: tool.rapids-build-backend
      key: requires
    includes:
      - common_build
      - python_build_nanobind
      - depends_on_libwholegraph
      - depends_on_libraft
      - depends_on_librmm
  py_run_pylibwholegraph:
    output: pyproject
    pyproject_dir: python/pylibwholegraph
    extras:
      table: project
    includes:
      - python_run_pylibwholegraph
      - depends_on_libwholegraph
  py_test_pylibwholegraph:
    output: pyproject
    pyproject_dir: python/pylibwholegraph
    extras:
      table: project.optional-dependencies
      key: test
    includes:
      - test_python_common
      - test_python_pylibwholegraph
  py_build_wholegraph_torch:
    output: pyproject
    pyproject_dir: python/wholegraph-torch
    extras:
      table: build-system
    includes:
      - python_build_rapids
      - python_build_wheel
  py_run_wholegraph_torch:
    output: pyproject
    pyproject_dir: python/wholegraph-torch
    extras:
      table: project
    includes:
      - depends_on_pylibwholegraph
      - python_run_wholegraph_torch
  py_test_wholegraph_torch:
    output: pyproject
    pyproject_dir: python/wholegraph-torch
    extras:
      table: project.optional-dependencies
      key: test
    includes:
      - test_python_common
      - test_python_wholegraph_torch
  py_build_cugraph_pyg:
    output: pyproject
    pyproject_dir: python/cugraph-pyg
    extras:
      table: build-system
    includes:
      - python_build_rapids
      - python_build_wheel
  py_run_cugraph_pyg:
    output: pyproject
    pyproject_dir: python/cugraph-pyg
    extras:
      table: project
    includes:
      - depends_on_cupy_gnn
      - depends_on_pylibwholegraph
      - depends_on_wholegraph_torch
      - depends_on_pylibcugraph
      - python_run_cugraph_pyg
  py_test_cugraph_pyg:
    output: pyproject
    pyproject_dir: python/cugraph-pyg
    extras:
      table: project.optional-dependencies
      key: test
    includes:
      - depends_on_cuml
      - test_python_common
  deps_that_require_torch:
    output: none
    includes:
      - depends_on_pyg
      - depends_on_sentence_transformers
  torch_only:
    output: none
    includes:
      - depends_on_pytorch
channels:
  - rapidsai-nightly
  - rapidsai
  - conda-forge
dependencies:
  checks:
    common:
      - output_types: [conda, requirements]
        packages:
          - pre-commit
  # 'cuda_version' intentionally does not contain fallback entries... we want
  # a loud error if an unsupported 'cuda' value is passed
  cuda_version:
    specific:
      - output_types: conda
        matrices:
          - matrix:
              cuda: "12.2"
            packages:
              - cuda-version=12.2
          - matrix:
              cuda: "12.5"
            packages:
              - cuda-version=12.5
          - matrix:
              cuda: "12.8"
            packages:
              - cuda-version=12.8
          - matrix:
              cuda: "12.9"
            packages:
              - cuda-version=12.9
          - matrix:
              cuda: "13.0"
            packages:
              - cuda-version=13.0
          - matrix:
              cuda: "13.1"
            packages:
              - cuda-version=13.1
          - matrix:
              cuda: "13.2"
            packages:
              - cuda-version=13.2
          - matrix:
              cuda: "13.3"
            packages:
              - cuda-version=13.3
      - output_types: requirements
        matrices:
          # if use_cuda_wheels=false is provided, do not add dependencies on any CUDA wheels
          # (e.g. for DLFW and pip devcontainers)
          - matrix:
              use_cuda_wheels: "false"
            packages:
          - matrix:
              arch: aarch64
              cuda: "12.2"
              use_cuda_wheels: "true"
            packages:
              # some components (like nvidia-cublas-cu12 and nvidia-cuda-nvcc-cu12) didn't have
              # aarch64 wheels until CTK 12.3, so allow a slightly looser bound here
              - cuda-toolkit>=12.2,<12.4
          - matrix:
              cuda: "12.2"
              use_cuda_wheels: "true"
            packages:
              - cuda-toolkit==12.2.*
          - matrix:
              cuda: "12.5"
              use_cuda_wheels: "true"
            packages:
              - cuda-toolkit==12.5.*
          - matrix:
              cuda: "12.8"
              use_cuda_wheels: "true"
            packages:
              - cuda-toolkit==12.8.*
          - matrix:
              cuda: "12.9"
              use_cuda_wheels: "true"
            packages:
              - cuda-toolkit==12.9.*
          - matrix:
              cuda: "13.0"
              use_cuda_wheels: "true"
            packages:
              - cuda-toolkit==13.0.*
          - matrix:
              cuda: "13.1"
              use_cuda_wheels: "true"
            packages:
              - cuda-toolkit==13.1.*
          - matrix:
              cuda: "13.2"
              use_cuda_wheels: "true"
            packages:
              - cuda-toolkit==13.2.*
          - matrix:
              cuda: "13.3"
              use_cuda_wheels: "true"
            packages:
              - cuda-toolkit==13.3.*
  cuda:
    common:
      - output_types: [conda]
        packages:
          - cuda-nvrtc-dev
          - cuda-nvtx-dev
          - cuda-profiler-api
  common_build:
    common:
      - output_types: [conda, requirements, pyproject]
        packages:
          - &cmake_ver cmake>=4.0
          - ninja
  cpp_build:
    common:
      - output_types: conda
        packages:
          - gtest
          - cuda-cudart-dev
          - libcublas-dev
          - libcurand-dev
          - libcusolver-dev
          - libcusparse-dev
          - nccl
          - nvcomp
  py_version:
    specific:
      - output_types: [conda]
        matrices:
          - matrix:
              py: "3.11"
            packages:
              - python=3.11
          - matrix:
              py: "3.12"
            packages:
              - python=3.12
          - matrix:
              py: "3.13"
            packages:
              - python=3.13
          - matrix:
              py: "3.14"
            packages:
              - python=3.14
          - matrix:
            packages:
              - python>=3.11
  python_build_rapids:
    common:
      - output_types: [conda, pyproject, requirements]
        packages:
          - rapids-build-backend>=0.4.0,<0.5.0
  python_build_wheel:
    common:
      - output_types: [conda, pyproject, requirements]
        packages:
          - setuptools>=77.0.0
          - wheel
  python_build_skbuild:
    common:
      - output_types: conda
        packages:
          - scikit-build-core>=0.11.0
      - output_types: [requirements, pyproject]
        packages:
          - scikit-build-core[pyproject]>=0.11.0
  python_build_nanobind:
    common:
      - output_types: [conda, pyproject, requirements]
        packages:
          - nanobind>=2.13.0
  python_run_cugraph_pyg:
    common:
      - output_types: [conda, pyproject, requirements]
        packages:
          - numpy>=2.0,<3.0
          - pandas
  python_run_pylibwholegraph:
    common:
      - output_types: [conda, pyproject, requirements]
        packages:
          - &numpy numpy>=2.0,<3.0
  python_run_wholegraph_torch:
    common:
      - output_types: [conda, pyproject, requirements]
        packages:
          - *numpy
  test_python_common:
    common:
      - output_types: [conda, pyproject, requirements]
        packages:
          - &pandas pandas
          - pytest
          - pytest-benchmark
          - pytest-cov
          - pytest-xdist
          - &scipy scipy
  test_cpp:
    common:
      - output_types: conda
        packages:
          - *cmake_ver
  test_python_pylibwholegraph:
    common:
      - output_types: [conda, pyproject, requirements]
        packages:
          - pytest-forked
          - *scipy
  test_python_wholegraph_torch:
    common:
      - output_types: [conda, pyproject, requirements]
        packages:
          - pytest-forked
          - *scipy
  depends_on_pytorch:
    specific:
      - output_types: conda
        matrices:
          - matrix:
              no_pytorch: "true"
            packages:
          - matrix:
              require_gpu: "true"
            packages:
              - pytorch-gpu>=2.3
          - matrix:
            packages:
      - output_types: conda
        matrices:
          - matrix:
              no_pytorch: "true"
            packages:
          - matrix:
              cuda: "12.*"
              dependencies: "oldest"
            packages:
              - pytorch==2.4.1
          - matrix:
              cuda: "13.*"
              dependencies: "oldest"
            packages:
              - pytorch==2.9
          - matrix:
            packages:
      - output_types: requirements
        matrices:
          - matrix:
              no_pytorch: "true"
            packages:
          - matrix:
              arch: aarch64
              cuda: "12.9"
              dependencies: "oldest"
              require_gpu: "true"
            packages:
              - &torch_cu129_index --extra-index-url=https://download.pytorch.org/whl/cu129
              - torch==2.9.0+cu129
          - matrix:
              cuda: "12.9"
              dependencies: "oldest"
              require_gpu: "true"
            packages:
              - *torch_cu129_index
              - torch==2.8.0+cu129
          - matrix:
              cuda: "12.9"
              require_gpu: "true"
            packages:
              - *torch_cu129_index
              - torch==2.10.0+cu129
          - matrix:
              cuda: "13.0"
              dependencies: "oldest"
              require_gpu: "true"
            packages:
              - &torch_index_cu13 --extra-index-url=https://download.pytorch.org/whl/cu130
              - torch==2.8.0+cu130
          - matrix:
              cuda: "13.0"
              require_gpu: "true"
            packages:
              - *torch_index_cu13
              - torch==2.10.0+cu130
          - matrix:
            packages:
  depends_on_ogb:
    common:
      - output_types: [conda]
        packages:
          - ogb
  depends_on_sentence_transformers:
    specific:
      - output_types: [conda, requirements, pyproject]
        matrices:
          - matrix:
              no_pytorch: "true"
            packages:
          - matrix:
            packages:
              - sentence-transformers>=3.0.1
  depends_on_pyg:
    common:
      - output_types: [conda]
        packages:
          - pytorch_geometric>=2.5,<2.8
    specific:
      - output_types: requirements
        matrices:
          - matrix:
              no_pytorch: "true"
            packages:
          - matrix:
            packages:
              - torch-geometric>=2.5,<2.8
  depends_on_cudf:
    common:
      - output_types: conda
        packages:
          - &cudf_unsuffixed cudf==26.8.*,>=0.0.0a0
      - output_types: requirements
        packages:
          # pip recognizes the index as a global option for the requirements.txt file
          - --extra-index-url=https://pypi.anaconda.org/rapidsai-wheels-nightly/simple
    specific:
      - output_types: [requirements, pyproject]
        matrices:
          - matrix:
              cuda: "12.*"
              cuda_suffixed: "true"
            packages:
              - cudf-cu12==26.8.*,>=0.0.0a0
          - matrix:
              cuda: "13.*"
              cuda_suffixed: "true"
            packages:
              - cudf-cu13==26.8.*,>=0.0.0a0
          - {matrix: null, packages: [*cudf_unsuffixed]}
  depends_on_nccl:
    common:
      - output_types: conda
        packages:
          - nccl>=2.19
    specific:
      - output_types: [pyproject, requirements]
        matrices:
          - matrix:
              cuda: "12.*"
              cuda_suffixed: "true"
            packages:
              - nvidia-nccl-cu12>=2.19
          - matrix:
              cuda: "13.*"
              cuda_suffixed: "true"
            packages:
              - nvidia-nccl-cu13>=2.19
          - matrix:
            packages:
  depends_on_libraft:
    common:
      - output_types: conda
        packages:
          - &libraft_unsuffixed libraft==26.8.*,>=0.0.0a0
      - output_types: requirements
        packages:
          # pip recognizes the index as a global option for the requirements.txt file
          - --extra-index-url=https://pypi.anaconda.org/rapidsai-wheels-nightly/simple
    specific:
      - output_types: [requirements, pyproject]
        matrices:
          - matrix:
              cuda: "12.*"
              cuda_suffixed: "true"
            packages:
              - libraft-cu12==26.8.*,>=0.0.0a0
          - matrix:
              cuda: "13.*"
              cuda_suffixed: "true"
            packages:
              - libraft-cu13==26.8.*,>=0.0.0a0
          - {matrix: null, packages: [*libraft_unsuffixed]}
  depends_on_librmm:
    common:
      - output_types: conda
        packages:
          - &librmm_unsuffixed librmm==26.8.*,>=0.0.0a0
      - output_types: requirements
        packages:
          # pip recognizes the index as a global option for the requirements.txt file
          - --extra-index-url=https://pypi.anaconda.org/rapidsai-wheels-nightly/simple
    specific:
      - output_types: [requirements, pyproject]
        matrices:
          - matrix:
              cuda: "12.*"
              cuda_suffixed: "true"
            packages:
              - librmm-cu12==26.8.*,>=0.0.0a0
          - matrix:
              cuda: "13.*"
              cuda_suffixed: "true"
            packages:
              - librmm-cu13==26.8.*,>=0.0.0a0
          - {matrix: null, packages: [*librmm_unsuffixed]}
  depends_on_libwholegraph:
    common:
      - output_types: conda
        packages:
          - &libwholegraph_unsuffixed libwholegraph==26.8.*,>=0.0.0a0
      - output_types: requirements
        packages:
          # pip recognizes the index as a global option for the requirements.txt file
          - --extra-index-url=https://pypi.nvidia.com
          - --extra-index-url=https://pypi.anaconda.org/rapidsai-wheels-nightly/simple
    specific:
      - output_types: [requirements, pyproject]
        matrices:
          - matrix:
              cuda: "12.*"
              cuda_suffixed: "true"
            packages:
              - libwholegraph-cu12==26.8.*,>=0.0.0a0
          - matrix:
              cuda: "13.*"
              cuda_suffixed: "true"
            packages:
              - libwholegraph-cu13==26.8.*,>=0.0.0a0
          - {matrix: null, packages: [*libwholegraph_unsuffixed]}
  depends_on_libwholegraph_tests:
    common:
      - output_types: conda
        packages:
          - libwholegraph-tests==26.8.*,>=0.0.0a0
  depends_on_pylibcugraph:
    common:
      - output_types: conda
        packages:
          - &pylibcugraph_unsuffixed pylibcugraph==26.8.*,>=0.0.0a0
      - output_types: requirements
        packages:
          # pip recognizes the index as a global option for the requirements.txt file
          - --extra-index-url=https://pypi.nvidia.com
          - --extra-index-url=https://pypi.anaconda.org/rapidsai-wheels-nightly/simple
    specific:
      - output_types: [requirements, pyproject]
        matrices:
          - matrix:
              cuda: "12.*"
              cuda_suffixed: "true"
            packages:
              - pylibcugraph-cu12==26.8.*,>=0.0.0a0
          - matrix:
              cuda: "13.*"
              cuda_suffixed: "true"
            packages:
              - pylibcugraph-cu13==26.8.*,>=0.0.0a0
          - {matrix: null, packages: [*pylibcugraph_unsuffixed]}
  depends_on_pylibwholegraph:
    common:
      - output_types: conda
        packages:
          - &pylibwholegraph_unsuffixed pylibwholegraph==26.8.*,>=0.0.0a0
      - output_types: requirements
        packages:
          # pip recognizes the index as a global option for the requirements.txt file
          - --extra-index-url=https://pypi.nvidia.com
          - --extra-index-url=https://pypi.anaconda.org/rapidsai-wheels-nightly/simple
    specific:
      - output_types: [requirements, pyproject]
        matrices:
          - matrix:
              cuda: "12.*"
              cuda_suffixed: "true"
            packages:
              - pylibwholegraph-cu12==26.8.*,>=0.0.0a0
          - matrix:
              cuda: "13.*"
              cuda_suffixed: "true"
            packages:
              - pylibwholegraph-cu13==26.8.*,>=0.0.0a0
          - {matrix: null, packages: [*pylibwholegraph_unsuffixed]}
  depends_on_wholegraph_torch:
    common:
      - output_types: conda
        packages:
          - &wholegraph_torch_unsuffixed wholegraph-torch==26.8.*,>=0.0.0a0
      - output_types: requirements
        packages:
          # pip recognizes the index as a global option for the requirements.txt file
          - --extra-index-url=https://pypi.nvidia.com
          - --extra-index-url=https://pypi.anaconda.org/rapidsai-wheels-nightly/simple
    specific:
      - output_types: [requirements, pyproject]
        matrices:
          - matrix:
              cuda: "12.*"
              cuda_suffixed: "true"
            packages:
              - wholegraph-torch-cu12==26.8.*,>=0.0.0a0
          - matrix:
              cuda: "13.*"
              cuda_suffixed: "true"
            packages:
              - wholegraph-torch-cu13==26.8.*,>=0.0.0a0
          - {matrix: null, packages: [*wholegraph_torch_unsuffixed]}
  depends_on_cugraph_pyg:
    common:
      - output_types: conda
        packages:
          - cugraph-pyg==26.8.*,>=0.0.0a0
  depends_on_cuml:
    common:
      - output_types: conda
        packages:
          - &cuml_unsuffixed cuml==26.8.*,>=0.0.0a0
      - output_types: requirements
        packages:
          # pip recognizes the index as a global option for the requirements.txt file
          - --extra-index-url=https://pypi.anaconda.org/rapidsai-wheels-nightly/simple
    specific:
      - output_types: [requirements, pyproject]
        matrices:
          - matrix:
              cuda: "12.*"
              cuda_suffixed: "true"
            packages:
              - cuml-cu12==26.8.*,>=0.0.0a0
          - matrix:
              cuda: "13.*"
              cuda_suffixed: "true"
            packages:
              - cuml-cu13==26.8.*,>=0.0.0a0
          - {matrix: null, packages: [*cuml_unsuffixed]}
  depends_on_cupy_gnn:
    common:
      - output_types: conda
        packages:
          - cupy>=14.0.1,!=14.1.0
    specific:
      - output_types: requirements
        matrices:
          - matrix:
              cuda: "12.*"
            packages:
              - cupy-cuda12x>=14.0.1,!=14.1.0
          - matrix:
            packages:
              - cupy-cuda13x>=14.0.1,!=14.1.0
      - output_types: pyproject
        matrices:
          - matrix:
              cuda: "12.*"
              use_cuda_wheels: "false"
            packages:
              - cupy-cuda12x>=14.0.1,!=14.1.0
          - matrix:
              cuda: "13.*"
              use_cuda_wheels: "false"
            packages:
              - cupy-cuda13x>=14.0.1,!=14.1.0
          - matrix:
              cuda: "12.*"
            packages:
              - cupy-cuda12x[ctk]>=14.0.1,!=14.1.0
          - matrix:
            packages:
              - cupy-cuda13x[ctk]>=14.0.1,!=14.1.0
