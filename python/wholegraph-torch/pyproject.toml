[build-system]
build-backend = "rapids_build_backend.build"
requires = [
    "rapids-build-backend>=0.4.0,<0.5.0",
    "setuptools>=77.0.0",
    "wheel",
] # This list was generated by `rapids-dependency-file-generator`. To make changes, edit ../../dependencies.yaml and run `rapids-dependency-file-generator`.

[tool.pytest.ini_options]
markers = [
    "mg: Test MG code paths - number of gpu > 1",
    "sg: Test SG code paths - number of gpu == 1",
]
testpaths = ["tests"]

[project]
name = "wholegraph-torch"
dynamic = ["version"]
description = "wholegraph-torch - PyTorch adapters for WholeGraph storage and embedding APIs."
readme = { file = "README.md", content-type = "text/markdown" }
authors = [
    { name = "NVIDIA Corporation" },
]
license = "Apache-2.0"
requires-python = ">=3.11"
classifiers = [
    "Intended Audience :: Developers",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
]
dependencies = [
    "numpy>=2.0,<3.0",
    "pylibwholegraph==26.8.*,>=0.0.0a0",
] # This list was generated by `rapids-dependency-file-generator`. To make changes, edit ../../dependencies.yaml and run `rapids-dependency-file-generator`.

[project.optional-dependencies]
test = [
    "pandas",
    "pytest",
    "pytest-benchmark",
    "pytest-cov",
    "pytest-forked",
    "pytest-xdist",
    "scipy",
] # This list was generated by `rapids-dependency-file-generator`. To make changes, edit ../../dependencies.yaml and run `rapids-dependency-file-generator`.

[tool.setuptools.dynamic]
version = {file = "src/wholegraph_torch/VERSION"}

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = [
    "src",
]
include = [
    "wholegraph_torch*",
    "wholegraph_torch.*",
]

[tool.setuptools.package-data]
wholegraph_torch = [
    "py.typed",
    "GIT_COMMIT",
    "torch_cpp_ext/*.cpp",
    "torch_cpp_ext/*.h",
    "VERSION",
]

[tool.rapids-build-backend]
build-backend = "setuptools.build_meta"
commit-files = ["src/wholegraph_torch/GIT_COMMIT"]
dependencies-file = "../../dependencies.yaml"
matrix-entry = "cuda_suffixed=true"

[tool.pydistcheck]
select = [
    "distro-too-large-compressed",
]

# PyPI hard limit is 1GiB, but try to keep these as small as possible
max_allowed_size_compressed = '10Mi'
