[build-system]

requires = [
    "rapids-build-backend>=0.4.0,<0.5.0",
    "setuptools>=77.0.0",
    "wheel",
] # This list was generated by `rapids-dependency-file-generator`. To make changes, edit ../../dependencies.yaml and run `rapids-dependency-file-generator`.
build-backend = "rapids_build_backend.build"

[tool.pytest.ini_options]
addopts = [
    "--benchmark-warmup=off",
    "--benchmark-max-time=0",
    "--benchmark-min-rounds=1",
    "--benchmark-columns=mean,rounds",
    "-m", "not slow"
]
markers = [
    "slow: slow-running tests/benchmarks",
    "mg: Test MG code paths - number of gpu > 1",
    "sg: Test SG code paths - number of gpu == 1",
]
testpaths = ["tests"]

[project]
name = "cugraph-pyg"
dynamic = ["version"]
description = "cugraph-pyg - PyG support for GPU neighbor sampling and distributed GNN storage."
readme = { file = "README.md", content-type = "text/markdown" }
authors = [
    { name = "NVIDIA Corporation" },
]
license = "Apache-2.0"
license-files = ["LICENSE"]
requires-python = ">=3.11"
classifiers = [
    "Intended Audience :: Developers",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
]
dependencies = [
    "cupy-cuda13x[ctk]>=14.0.1,!=14.1.0",
    "numpy>=2.0,<3.0",
    "pandas",
    "pylibcugraph==26.8.*,>=0.0.0a0",
    "pylibwholegraph==26.8.*,>=0.0.0a0",
    "wholegraph-torch==26.8.*,>=0.0.0a0",
] # This list was generated by `rapids-dependency-file-generator`. To make changes, edit ../../dependencies.yaml and run `rapids-dependency-file-generator`.

[project.entry-points."rapids_doctor_check"]
cugraph_pyg_smoke_check = "cugraph_pyg._doctor_check:cugraph_pyg_smoke_check"

[project.urls]
Homepage = "https://github.com/rapidsai/cugraph"
Documentation = "https://docs.rapids.ai/api/cugraph/stable/"

[project.optional-dependencies]
test = [
    "cuml==26.8.*,>=0.0.0a0",
    "pandas",
    "pytest",
    "pytest-benchmark",
    "pytest-cov",
    "pytest-xdist",
    "scipy",
] # This list was generated by `rapids-dependency-file-generator`. To make changes, edit ../../dependencies.yaml and run `rapids-dependency-file-generator`.

[tool.setuptools.dynamic]
version = {file = "src/cugraph_pyg/VERSION"}

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = [
    "src",
]
include = [
    "cugraph_pyg*",
    "cugraph_pyg.*",
]

[tool.setuptools.package-data]
cugraph_pyg = [
    "GIT_COMMIT",
    "VERSION",
]

[tool.rapids-build-backend]
build-backend = "setuptools.build_meta"
commit-files = ["src/cugraph_pyg/GIT_COMMIT"]
dependencies-file = "../../dependencies.yaml"
matrix-entry = "cuda_suffixed=true"

[tool.pydistcheck]
select = [
    "distro-too-large-compressed",
]

# PyPI hard limit is 1GiB, but try to keep these as small as possible
max_allowed_size_compressed = '10Mi'
