schema_version: 1

context:
  version: ${{ env.get("RAPIDS_PACKAGE_VERSION") }}
  minor_version: ${{ (version | split("."))[:2] | join(".") }}
  date_string: '${{ env.get("RAPIDS_DATE_STRING") }}'
  py_version: ${{ env.get("RAPIDS_PY_VERSION") }}
  head_rev: '${{ git.head_rev(".")[:8] }}'

package:
  name: wholegraph-torch
  version: ${{ version }}

source:
  path: ../../..

build:
  noarch: python
  string: ${{ date_string }}_${{ head_rev }}
  script:
    content: |
      ./build.sh wholegraph-torch --allgpuarch

requirements:
  host:
    - pip
    - python >=3.11
    - rapids-build-backend >=0.4.0,<0.5.0
    - setuptools>=77.0.0
    - wheel
  run:
    - numpy >=2.0,<3.0
    - pylibwholegraph =${{ minor_version }}
    - python
    # This adapter can be imported without PyTorch, but its public API is for
    # PyTorch tensors and modules.
    - pytorch >=2.3

tests:
  - python:
      imports: wholegraph_torch
      pip_check: false

about:
  homepage: https://rapids.ai/
  license: ${{ load_from_file("python/wholegraph-torch/pyproject.toml").project.license }}
  summary: ${{ load_from_file("python/wholegraph-torch/pyproject.toml").project.description }}
