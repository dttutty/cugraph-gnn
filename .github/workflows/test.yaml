name: test

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch used for organizing artifacts."
        required: true
        type: string
      date:
        description: "Date (YYYY-MM-DD) used for organizing artifacts."
        required: true
        type: string
      sha:
        description: "Full git commit SHA to check out."
        required: true
        type: string
      build_type:
        description: "One of [branch, nightly, pull-request]."
        type: string
        default: nightly

permissions: {}

jobs:
  conda-cpp-tests:
    secrets: inherit # zizmor: ignore[secrets-inherit]
    uses: rapidsai/shared-workflows/.github/workflows/conda-cpp-tests.yaml@main
    with:
      build_type: ${{ inputs.build_type }}
      branch: ${{ inputs.branch }}
      date: ${{ inputs.date }}
      script: ci/test_cpp.sh
      sha: ${{ inputs.sha }}
    permissions:
      actions: read
      contents: read
      id-token: write
      packages: read
      pull-requests: read

  conda-python-tests:
    secrets: inherit # zizmor: ignore[secrets-inherit]
    uses: rapidsai/shared-workflows/.github/workflows/conda-python-tests.yaml@main
    with:
      build_type: ${{ inputs.build_type }}
      branch: ${{ inputs.branch }}
      date: ${{ inputs.date }}
      script: ci/test_python.sh
      sha: ${{ inputs.sha }}
      matrix_filter: map(select((.ARCH == "amd64") or ((.ARCH == "arm64") and (.CUDA_VER != "12.2.2"))))
    permissions:
      actions: read
      contents: read
      id-token: write
      packages: read
      pull-requests: read

  wheel-tests-pylibwholegraph:
    secrets: inherit # zizmor: ignore[secrets-inherit]
    uses: rapidsai/shared-workflows/.github/workflows/wheels-test.yaml@main
    with:
      build_type: ${{ inputs.build_type }}
      branch: ${{ inputs.branch }}
      date: ${{ inputs.date }}
      script: ci/test_wheel_pylibwholegraph.sh
      sha: ${{ inputs.sha }}
    permissions:
      actions: read
      contents: read
      id-token: write
      packages: read
      pull-requests: read

  wheel-tests-wholegraph-torch:
    secrets: inherit # zizmor: ignore[secrets-inherit]
    uses: rapidsai/shared-workflows/.github/workflows/wheels-test.yaml@main
    with:
      build_type: ${{ inputs.build_type }}
      branch: ${{ inputs.branch }}
      date: ${{ inputs.date }}
      script: ci/test_wheel_wholegraph-torch.sh
      sha: ${{ inputs.sha }}
    permissions:
      actions: read
      contents: read
      id-token: write
      packages: read
      pull-requests: read

  wheel-tests-cugraph-pyg:
    secrets: inherit # zizmor: ignore[secrets-inherit]
    uses: rapidsai/shared-workflows/.github/workflows/wheels-test.yaml@main
    with:
      build_type: ${{ inputs.build_type }}
      branch: ${{ inputs.branch }}
      date: ${{ inputs.date }}
      script: ci/test_wheel_cugraph-pyg.sh
      sha: ${{ inputs.sha }}
    permissions:
      actions: read
      contents: read
      id-token: write
      packages: read
      pull-requests: read
